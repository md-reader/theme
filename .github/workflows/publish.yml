name: Publish

on: push

jobs:
  publish:
    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: read
      id-token: write # For OIDC

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm publish --provenance
